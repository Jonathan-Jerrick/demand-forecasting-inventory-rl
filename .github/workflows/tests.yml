name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # the invariant tests only need numpy/pandas (no torch/lightgbm), so CI is fast
      - run: pip install numpy pandas pyarrow pytest
      - run: pytest tests/ -q
